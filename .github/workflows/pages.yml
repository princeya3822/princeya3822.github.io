name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A19538: ${{ secrets.A19538 }}
          B87EBC: ${{ secrets.B87EBC }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A19538', '')
          tag_b = os.environ.get('B87EBC', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 211ddcd143b777474da3eb6c78efc0fb3510d18785 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- b837c421a5e2079de9b1e69c57 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
